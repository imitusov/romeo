<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Romeo</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 16px;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
    }

    h1 {
      color: #ffffff;
      margin: 0;
    }

    .nav-button {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      background-color: #ffffff;
      color: #2575fc;
    }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(110px, 1fr));
      gap: 12px;
      width: min(420px, 90vw);
    }
  </style>
</head>
<body>
  <h1>Hello, Romeo</h1>
  <div class="days-grid">
    <button class="nav-button" onclick="window.location.href='days/day1.html'">Day 1</button>
    <button class="nav-button" onclick="window.location.href='days/day2.html'">Day 2</button>
    <button class="nav-button" onclick="window.location.href='days/day3.html'">Day 3</button>
    <button class="nav-button" onclick="window.location.href='days/day4.html'">Day 4</button>
    <button class="nav-button" onclick="window.location.href='days/day5.html'">Day 5</button>
    <button class="nav-button" onclick="window.location.href='days/day6.html'">Day 6</button>
    <button class="nav-button" onclick="window.location.href='days/day7.html'">Day 7</button>
    <button class="nav-button" onclick="window.location.href='days/day8.html'">Day 8</button>
    <button class="nav-button" onclick="window.location.href='days/day9.html'">Day 9</button>
    <button class="nav-button" onclick="window.location.href='days/day10.html'">Day 10</button>
    <button class="nav-button" onclick="window.location.href='days/day11.html'">Day 11</button>
    <button class="nav-button" onclick="window.location.href='days/day12.html'">Day 12</button>
  </div>
</body>
</html>
